name: Cerca offerte automatiche

on:
  workflow_dispatch:

  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
      options: --ipc=host

    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    steps:
      - name: Scarica repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verifica cartella repository
        run: |
          echo "Cartella corrente:"
          pwd

          echo "Contenuto:"
          ls -la

          echo "Repository Git:"
          git rev-parse --show-toplevel

      - name: Mostra versione Node.js
        run: |
          node --version
          npm --version

      - name: Installa dipendenze progetto
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Allinea Playwright al container
        run: |
          npm install \
            --no-save \
            --package-lock=false \
            playwright@1.61.0

          echo "Versione Playwright:"
          npx playwright --version

      - name: Cerca offerte dei supermercati selezionati
        timeout-minutes: 8
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          FAMILY_CODE: ${{ secrets.FAMILY_CODE }}
          MINIMUM_MATCH_SCORE: "0.62"
          PENNY_FLYER_ID: ${{ secrets.PENNY_FLYER_ID }}
          LIDL_DEBUG: "true"
          PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"
        run: npm run scan-offers

      - name: Riepilogo offerte trovate
        if: always()
        run: |
          if [ -f data/offerte.json ]; then
            node -e "
              const fs = require('fs');

              const offerte = JSON.parse(
                fs.readFileSync('data/offerte.json', 'utf8')
              );

              const gruppi = Object.groupBy(
                offerte,
                offerta => offerta.store || offerta.chain || 'Altro'
              );

              console.log('Totale offerte:', offerte.length);

              for (const [catena, elementi] of Object.entries(gruppi)) {
                const locali = elementi.filter(
                  elemento => elemento.localValidityVerified
                ).length;

                console.log(
                  catena + ':',
                  elementi.length,
                  '- locali verificati:',
                  locali
                );
              }
            "
          else
            echo "File data/offerte.json non trovato."
          fi

          if [ -f data/catalogo.json ]; then
            node -e "
              const fs = require('fs');

              const catalogo = JSON.parse(
                fs.readFileSync('data/catalogo.json', 'utf8')
              );

              console.log(
                'Catalogo unificato:',
                catalogo.items?.length || 0,
                'voci'
              );
            "
          else
            echo "File data/catalogo.json non trovato."
          fi

          echo ""
          echo "=== Stato collegamenti locali ==="

          if [ -f data/volantini-locali.json ]; then
            cat data/volantini-locali.json
          else
            echo "File data/volantini-locali.json non trovato."
          fi

      - name: Carica diagnostica Lidl
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lidl-debug-${{ github.run_number }}
          path: debug/lidl/
          if-no-files-found: warn
          retention-days: 14

      - name: Salva offerte aggiornate
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$GITHUB_WORKSPACE"

          echo "Cartella usata per il salvataggio:"
          pwd

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git status

          git add \
            data/offerte.json \
            data/volantini-locali.json \
            data/catalogo.json

          if git diff --cached --quiet; then
            echo "Nessun aggiornamento da salvare."
          else
            git commit -m "Aggiorna offerte automatiche"
            git push origin HEAD:${{ github.ref_name }}
          fi
