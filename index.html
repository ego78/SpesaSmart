<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#157347"><meta name="description" content="Spesa Smart: prodotti e offerte della famiglia">
<title>Spesa Smart</title><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="assets/icons/icon.svg">
<style>
:root{--p:#157347;--pd:#0f5c39;--ps:#e9f6ef;--bg:#f4f7f5;--s:#fff;--t:#18201c;--m:#6b756f;--b:#dde5e0;--d:#b42318}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;padding-bottom:84px;background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}button,input,select{font:inherit}button{cursor:pointer}.head{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:18px 20px;background:var(--s);border-bottom:1px solid var(--b)}h1,h2,h3,p{margin-top:0}.ey{margin:0 0 3px;color:var(--p);font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.head h1{margin:0;font-size:1.65rem}.wrap{width:min(100%,760px);margin:auto;padding:18px}.sum{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px;border-radius:22px;background:var(--p);color:#fff}.sum p{margin:0}.num{font-size:2rem;font-weight:800}.actions,.toolbar,.formgrid,.dialogactions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{margin:16px 0 28px}.btn{min-height:46px;padding:11px 16px;border-radius:13px;font-weight:750}.primary{border:1px solid var(--p);background:var(--p);color:#fff}.primary:hover{background:var(--pd)}.secondary{border:1px solid var(--b);background:var(--s);color:var(--t)}.icon{width:43px;height:43px;border:1px solid var(--b);border-radius:50%;background:var(--s)}section{margin-top:28px}.sectionhead{margin-bottom:12px}.sectionhead h2{margin:0;font-size:1.2rem}.toolbar{margin-bottom:12px;grid-template-columns:1fr 190px}input,select{width:100%;min-height:46px;padding:11px 13px;border:1px solid var(--b);border-radius:12px;background:#fff;color:var(--t)}input:focus,select:focus{outline:3px solid rgba(21,115,71,.15);border-color:var(--p)}.list{display:grid;gap:11px}.card,.empty{padding:17px;border:1px solid var(--b);border-radius:17px;background:var(--s)}.empty{text-align:center;border-style:dashed;padding:30px 20px}.empty p,.meta{color:var(--m);line-height:1.45}.top{display:flex;justify-content:space-between;gap:12px}.name{margin:0;font-size:1.03rem}.badge{display:inline-flex;align-items:center;align-self:flex-start;padding:5px 9px;border-radius:999px;background:var(--ps);color:var(--pd);font-size:.82rem;font-weight:750;white-space:nowrap}.cardactions{display:flex;justify-content:flex-end;gap:5px;margin-top:12px;flex-wrap:wrap}.textbtn{border:0;background:transparent;padding:7px 8px;color:var(--p);font-weight:750}.danger{color:var(--d)}.price{font-size:1.3rem;font-weight:800;color:var(--p)}.old{text-decoration:line-through;color:var(--m);font-size:.9rem}.nav{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(3,1fr);min-height:68px;background:rgba(255,255,255,.96);border-top:1px solid var(--b)}.nav button{border:0;background:transparent;color:var(--m);display:grid;place-content:center;gap:2px;font-size:.75rem}.nav button span:first-child{font-size:1.2rem}dialog{width:min(calc(100% - 24px),560px);max-height:calc(100vh - 30px);padding:0;border:0;border-radius:20px;background:var(--s);color:var(--t)}dialog::backdrop{background:rgba(0,0,0,.55)}.dhead{display:flex;justify-content:space-between;align-items:center;padding:18px;border-bottom:1px solid var(--b)}.dhead h2{margin:0}.field,.formgrid,.dialogactions,.msg,.check{margin-left:18px;margin-right:18px}.field{display:grid;gap:7px;margin-top:15px}.field label{font-weight:700}.field small{color:var(--m)}.formgrid .field{margin-left:0;margin-right:0}.check{display:flex;gap:9px;align-items:center;margin-top:16px}.check input{width:19px;height:19px}.dialogactions{margin-top:22px}.msg{min-height:22px;margin-top:10px;margin-bottom:16px;text-align:center;color:var(--d)}@media(max-width:560px){.wrap{padding:14px}.actions,.toolbar,.formgrid{grid-template-columns:1fr}.top{flex-direction:column}.num{font-size:1.7rem}}@media(prefers-color-scheme:dark){:root{--bg:#111714;--s:#18201c;--t:#f1f5f2;--m:#a8b3ac;--b:#314039;--ps:#173d2b}input,select{background:#111714}.nav{background:rgba(24,32,28,.96)}}
</style>
</head>
<body>
<header class="head"><div><p class="ey">La spesa della famiglia</p><h1>Spesa Smart</h1></div><button id="settingsBtn" class="icon" aria-label="Impostazioni">⚙️</button></header>
<main class="wrap">
<section class="sum"><div><p>Offerte trovate</p><p id="offersCount" class="num">0</p></div><div><p>Prodotti controllati</p><p id="productsCount" class="num">0</p></div></section>
<div class="actions"><button id="addBtn" class="btn primary">＋ Aggiungi prodotto</button><button id="refreshBtn" class="btn secondary">Aggiorna offerte</button></div>
<section id="productsSection"><div class="sectionhead"><p class="ey">I tuoi alimenti</p><h2>Prodotti monitorati</h2></div><div class="toolbar"><input id="search" type="search" placeholder="Cerca un prodotto…"><select id="filter"><option value="">Tutte le categorie</option></select></div><div id="products" class="list"></div></section>
<section id="offersSection"><div class="sectionhead"><p class="ey">Promozioni</p><h2>Offerte recenti</h2></div><div id="offers" class="list"></div></section>
</main>
<nav class="nav"><button data-go="productsSection"><span>🏠</span><span>Home</span></button><button id="navAdd"><span>➕</span><span>Aggiungi</span></button><button data-go="offersSection"><span>🏷️</span><span>Offerte</span></button></nav>
<dialog id="productDialog"><div class="dhead"><div><p class="ey">Prodotto</p><h2 id="dialogTitle">Aggiungi prodotto</h2></div><button id="closeProduct" class="icon">✕</button></div><input id="editId" type="hidden"><div class="field"><label for="name">Nome *</label><input id="name" placeholder="Esempio: latte intero"></div><div class="formgrid"><div class="field"><label for="brand">Marca</label><input id="brand" placeholder="Qualsiasi"></div><div class="field"><label for="format">Formato</label><input id="format" placeholder="1 L"></div></div><div class="formgrid"><div class="field"><label for="category">Categoria</label><select id="category"><option>Alimentari</option><option>Bevande</option><option>Colazione</option><option>Dispensa</option><option>Fresco</option><option>Frutta e verdura</option><option>Igiene casa</option><option>Igiene persona</option><option>Infanzia</option><option>Surgelati</option><option>Altro</option></select></div><div class="field"><label for="maxPrice">Prezzo massimo (€)</label><input id="maxPrice" type="number" min="0" step="0.01" placeholder="0,00"></div></div><label class="check"><input id="favorite" type="checkbox"> Preferito</label><div class="dialogactions"><button id="cancelProduct" class="btn secondary">Annulla</button><button id="saveProduct" class="btn primary">Salva</button></div><p id="formMsg" class="msg"></p></dialog>
<dialog id="settingsDialog"><div class="dhead"><div><p class="ey">Configurazione</p><h2>Impostazioni</h2></div><button id="closeSettings" class="icon">✕</button></div><div class="field"><label for="familyCode">Codice famiglia</label><input id="familyCode" placeholder="famiglia-rossi"></div><div class="field"><label for="city">Città o CAP</label><input id="city" placeholder="Sava 74028"></div><div class="field"><label for="scriptUrl">URL Apps Script (facoltativo)</label><input id="scriptUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec"><small>L'app funziona anche senza collegamento Google.</small></div><div class="dialogactions"><button id="exportBtn" class="btn secondary">Esporta dati</button><button id="saveSettings" class="btn primary">Salva</button></div><p id="settingsMsg" class="msg"></p></dialog>
<script>
const PK='spesaSmart.products.v1',SK='spesaSmart.settings.v1';let products=read(PK,[]),settings=read(SK,{}),offers=[];const $=id=>document.getElementById(id);function read(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}}function write(k,v){localStorage.setItem(k,JSON.stringify(v))}function esc(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function money(v){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(Number(v))}function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(16).slice(2)}
function openProduct(p=null){$('dialogTitle').textContent=p?'Modifica prodotto':'Aggiungi prodotto';$('editId').value=p?.id||'';$('name').value=p?.name||'';$('brand').value=p?.brand||'';$('format').value=p?.format||'';$('category').value=p?.category||'Alimentari';$('maxPrice').value=p?.maximumPrice||'';$('favorite').checked=!!p?.favorite;$('formMsg').textContent='';$('productDialog').showModal();setTimeout(()=>$('name').focus(),40)}
async function sync(action,payload){if(!settings.scriptUrl)return;try{await fetch(settings.scriptUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,familyCode:settings.familyCode||'default',...payload})})}catch(e){console.warn(e)}}
function saveProduct(){const name=$('name').value.trim(),id=$('editId').value;if(!name){$('formMsg').textContent='Inserisci il nome del prodotto.';return}if(products.some(p=>p.id!==id&&p.name.toLowerCase()===name.toLowerCase())){$('formMsg').textContent='Prodotto già presente.';return}const p={id:id||uid(),name,brand:$('brand').value.trim(),format:$('format').value.trim(),category:$('category').value,maximumPrice:$('maxPrice').value?Number($('maxPrice').value):null,favorite:$('favorite').checked,updatedAt:new Date().toISOString()};products=id?products.map(x=>x.id===id?p:x):[p,...products];write(PK,products);render();$('productDialog').close();sync('upsertProduct',{product:p})}
function del(id){const p=products.find(x=>x.id===id);if(!p||!confirm('Eliminare "'+p.name+'"?'))return;products=products.filter(x=>x.id!==id);write(PK,products);render();sync('deleteProduct',{productId:id})}function duplicate(id){const p=products.find(x=>x.id===id);if(!p)return;products=[{...p,id:uid(),name:p.name+' copia',updatedAt:new Date().toISOString()},...products];write(PK,products);render()}
function relevantOffers(){const names=products.map(p=>p.name.toLowerCase());return offers.filter(o=>!names.length||names.some(n=>o.product.toLowerCase().includes(n)||n.includes(o.product.toLowerCase())))}
function render(){const cats=[...new Set(products.map(p=>p.category).filter(Boolean))].sort();const cur=$('filter').value;$('filter').innerHTML='<option value="">Tutte le categorie</option>'+cats.map(c=>`<option>${esc(c)}</option>`).join('');$('filter').value=cats.includes(cur)?cur:'';const q=$('search').value.toLowerCase(),cat=$('filter').value;const list=products.filter(p=>(!q||[p.name,p.brand,p.format,p.category].join(' ').toLowerCase().includes(q))&&(!cat||p.category===cat)).sort((a,b)=>Number(b.favorite)-Number(a.favorite)||a.name.localeCompare(b.name,'it'));$('products').innerHTML=list.length?list.map(p=>`<article class="card"><div class="top"><div><h3 class="name">${esc(p.name)} ${p.favorite?'⭐':''}</h3><p class="meta">${[p.brand,p.format,p.category].filter(Boolean).map(esc).join(' · ')}</p></div><span class="badge">${p.maximumPrice?'Sotto '+money(p.maximumPrice):'Monitorato'}</span></div><div class="cardactions"><button class="textbtn" data-a="duplicate" data-id="${p.id}">Duplica</button><button class="textbtn" data-a="edit" data-id="${p.id}">Modifica</button><button class="textbtn danger" data-a="delete" data-id="${p.id}">Elimina</button></div></article>`).join(''):`<div class="empty"><div style="font-size:2rem">🛒</div><h3>Nessun prodotto inserito</h3><p>Aggiungi gli alimenti e i prodotti che comprate più spesso.</p><button id="emptyAdd" class="btn primary">Aggiungi il primo prodotto</button></div>`;$('emptyAdd')?.addEventListener('click',()=>openProduct());document.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',()=>b.dataset.a==='edit'?openProduct(products.find(p=>p.id===b.dataset.id)):b.dataset.a==='delete'?del(b.dataset.id):duplicate(b.dataset.id)));const ro=relevantOffers();$('offers').innerHTML=ro.length?ro.map(o=>`<article class="card"><div class="top"><div><h3 class="name">${esc(o.product)}</h3><p class="meta">${esc(o.store)}${o.format?' · '+esc(o.format):''}<br>Valida fino al ${esc(o.validUntil||'dato non disponibile')}</p></div><div><div class="price">${money(o.price)}</div>${o.oldPrice?`<div class="old">${money(o.oldPrice)}</div>`:''}</div></div></article>`).join(''):`<div class="empty"><div style="font-size:2rem">🏷️</div><h3>Nessuna offerta trovata</h3><p>Le offerte appariranno qui quando il file data/offerte.json verrà aggiornato.</p></div>`;$('productsCount').textContent=products.length;$('offersCount').textContent=ro.length}
async function refreshOffers(){const b=$('refreshBtn');b.disabled=true;b.textContent='Aggiornamento…';try{const r=await fetch('data/offerte.json?t='+Date.now(),{cache:'no-store'});offers=await r.json()}catch{offers=[]}render();b.disabled=false;b.textContent='Aggiorna offerte'}
$('addBtn').onclick=$('navAdd').onclick=()=>openProduct();$('closeProduct').onclick=$('cancelProduct').onclick=()=>$('productDialog').close();$('saveProduct').onclick=saveProduct;$('name').addEventListener('keydown',e=>{if(e.key==='Enter')saveProduct()});$('search').oninput=render;$('filter').onchange=render;$('refreshBtn').onclick=refreshOffers;$('settingsBtn').onclick=()=>{$('familyCode').value=settings.familyCode||'';$('city').value=settings.city||'';$('scriptUrl').value=settings.scriptUrl||'';$('settingsMsg').textContent='';$('settingsDialog').showModal()};$('closeSettings').onclick=()=>$('settingsDialog').close();$('saveSettings').onclick=()=>{settings={familyCode:$('familyCode').value.trim(),city:$('city').value.trim(),scriptUrl:$('scriptUrl').value.trim()};write(SK,settings);$('settingsMsg').style.color='var(--p)';$('settingsMsg').textContent='Impostazioni salvate.';setTimeout(()=>$('settingsDialog').close(),450)};$('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),products,settings},null,2)],{type:'application/json'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='spesa-smart-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u)};document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>$(b.dataset.go).scrollIntoView({behavior:'smooth'}));if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(console.warn));render();refreshOffers();
</script>
</body></html>
